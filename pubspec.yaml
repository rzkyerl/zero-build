name: zero
description: "Compress photos & videos for social media — offline, 1-2 clicks."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  ffmpeg_kit_flutter_new: ^4.1.0
  path_provider: ^2.1.4
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  video_thumbnail: ^0.5.3
  path: ^1.9.0
  lucide_icons_flutter: ^3.1.13
  video_player: ^2.11.1
  saver_gallery: ^4.1.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 24
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
